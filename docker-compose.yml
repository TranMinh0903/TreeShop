services:
  # ==============================
  # SQL Server Database
  # ==============================
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: TreeShop-SqlServer
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=TreeShop@123
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
      - ./init-db:/docker-entrypoint-initdb
    entrypoint: /bin/bash /docker-entrypoint-initdb/entrypoint.sh
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "TreeShop@123" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s

  # ==============================
  # TreeShop Web API (.NET 8)
  # ==============================
  web-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: TreeShop
    ports:
      - "9090:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=ShopDB;User Id=sa;Password=TreeShop@123;TrustServerCertificate=True;Encrypt=False;
      - JwtSettings__SecretKey=iemduelqfopeiovjovmedocmelqnvvie
      - JwtSettings__ExpTime=60
      - JwtSettings__Issuer=tree-shop
      - JwtSettings__Audience=tree-shop-users
    depends_on:
      sqlserver:
        condition: service_healthy

  # ==============================
  # Adminer - Web UI xem Database
  # ==============================
  adminer:
    image: adminer:latest
    container_name: TreeShop-Adminer
    ports:
      - "8081:8080"
    depends_on:
      sqlserver:
        condition: service_healthy

volumes:
  sqlserver-data:
